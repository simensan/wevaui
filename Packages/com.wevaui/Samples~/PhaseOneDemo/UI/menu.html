<link rel="stylesheet" href="menu.css" />
<main class="menu">
  <h1>My Game</h1>
  <p>Coins: <span>{{ CoinCount }}</span></p>
  <button id="start-button" on-click="OnStart">Start</button>

  <article class="card card-typography">
    <h2>Real fonts</h2>
    <p style="font-family: serif">Times-style serif paragraph.</p>
    <p style="font-family: monospace">Monospace fixed-width.</p>
    <p style="font-style: italic">Italic emphasis.</p>
    <p><span style="font-weight: bold">Bold</span> mid-sentence.</p>
  </article>

  <footer class="footer">
    <p>Hover any button. Resize the game view. Edit <code>menu.css</code> — hot reload picks it up. Press <kbd>F12</kbd> for devtools.</p>
  </footer>
</main>
