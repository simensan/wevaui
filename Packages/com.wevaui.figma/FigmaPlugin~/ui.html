<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 12px -apple-system, "Segoe UI", sans-serif; margin: 0; padding: 12px; color: #1a1a1a; }
    h1 { font-size: 13px; margin: 0 0 8px; }
    button { font: inherit; padding: 7px 12px; border: none; border-radius: 6px; cursor: pointer; }
    .primary { background: #18a0fb; color: #fff; width: 100%; height: 32px; }
    .dl { background: #eef2f6; color: #1a1a1a; margin: 4px 6px 0 0; }
    .dl:disabled { opacity: 0.4; cursor: default; }
    .row { margin-top: 10px; }
    .muted { color: #7a7a7a; }
    .warn { color: #b35900; background: #fff6e8; border-radius: 4px; padding: 4px 6px; margin-top: 4px; }
    #downloads { margin-top: 8px; }
    code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; }
    .cheat { margin-top: 14px; border-top: 1px solid #e6e6e6; padding-top: 8px; }
    .cheat div { margin: 2px 0; }
  </style>
</head>
<body>
  <h1>Weva Export</h1>
  <div class="muted">Select a frame or component, then export. No Figma token needed.</div>
  <div class="row"><button class="primary" id="export">Export selection</button></div>

  <div id="status" class="row muted"></div>
  <div id="warnings"></div>
  <div id="downloads"></div>

  <div class="cheat">
    <strong>Layer-name annotations</strong>
    <div><code>{{ Expr }}</code> — bound text</div>
    <div><code>#my-id</code> — element id &nbsp; <code>&lt;button&gt;</code> — tag</div>
    <div><code>@click=OnPlay</code> — event &nbsp; <code>.sel?IsSel</code> — class toggle</div>
    <div><code>*each=Items:item</code> — repeat (first child becomes the template)</div>
  </div>

  <script>
    var current = null;

    document.getElementById('export').onclick = function () {
      setStatus('Exporting…');
      clear('warnings'); clear('downloads');
      parent.postMessage({ pluginMessage: { type: 'export' } }, '*');
    };

    onmessage = function (event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'error') { setStatus('Error: ' + msg.message); return; }
      if (msg.type === 'export-result') { current = msg.payload; render(); }
    };

    function render() {
      var p = current;
      if (!p.node) { setStatus('Nothing to export.'); }
      else {
        var imgCount = Object.keys(p.images || {}).length;
        setStatus('Exported "' + p.name + '" — ' + imgCount + ' image(s)' + (p.variables ? ', variables included' : ''));
      }

      (p.warnings || []).forEach(function (w) {
        var d = document.createElement('div'); d.className = 'warn'; d.textContent = w;
        document.getElementById('warnings').appendChild(d);
      });

      var dl = document.getElementById('downloads');
      if (p.node) dl.appendChild(button(p.name + '.figma.json', function () {
        download(p.name + '.figma.json', JSON.stringify(p.node, null, 2), 'application/json');
      }));
      if (p.variables) dl.appendChild(button(p.name + '.variables.json', function () {
        download(p.name + '.variables.json', JSON.stringify(p.variables, null, 2), 'application/json');
      }));
      var names = Object.keys(p.images || {});
      if (names.length) dl.appendChild(button('Download ' + names.length + ' image(s)', function () {
        names.forEach(function (fn) { downloadBase64(basename(fn), p.images[fn]); });
      }));
    }

    function button(label, fn) { var b = document.createElement('button'); b.className = 'dl'; b.textContent = label; b.onclick = fn; return b; }
    function setStatus(s) { document.getElementById('status').textContent = s; }
    function clear(id) { document.getElementById(id).innerHTML = ''; }
    function basename(p) { var i = p.lastIndexOf('/'); return i >= 0 ? p.slice(i + 1) : p; }

    function download(filename, text, mime) {
      var blob = new Blob([text], { type: mime });
      trigger(URL.createObjectURL(blob), filename);
    }
    function downloadBase64(filename, b64) {
      var bin = atob(b64); var len = bin.length; var bytes = new Uint8Array(len);
      for (var i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
      var blob = new Blob([bytes], { type: 'image/png' });
      trigger(URL.createObjectURL(blob), filename);
    }
    function trigger(url, filename) {
      var a = document.createElement('a'); a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    }
  </script>
</body>
</html>
