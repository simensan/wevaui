<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sweet Cascade - Level Complete</title>
<link rel="stylesheet" href="match3-endgame.css" />
</head>
<body>

<section class="end-overlay" role="dialog" aria-modal="true" aria-labelledby="complete-title">
  <div class="confetti c1"></div>
  <div class="confetti c2"></div>
  <div class="confetti c3"></div>
  <div class="confetti c4"></div>
  <div class="confetti c5"></div>
  <div class="confetti c6"></div>
  <div class="confetti c7"></div>
  <div class="confetti c8"></div>

  <article class="end-card">
    <div class="card-halo"></div>

    <div class="badge">
      <span class="badge-spark s1"></span>
      <span class="badge-spark s2"></span>
      <span class="badge-spark s3"></span>
      <span class="badge-mark">18</span>
    </div>

    <p class="eyebrow">Level complete</p>
    <h1 id="complete-title">Sugar Rush</h1>

    <div class="rating" aria-label="Three star result">
      <span class="rating-star star-one">&#9733;</span>
      <span class="rating-star star-two">&#9733;</span>
      <span class="rating-star star-three">&#9733;</span>
    </div>

    <div class="score-panel">
      <div class="score-row score-main">
        <span>Score</span>
        <strong>126,480</strong>
      </div>
      <div class="score-row">
        <span>Target</span>
        <strong>90,000</strong>
      </div>
      <div class="score-row">
        <span>Moves bonus</span>
        <strong>+12,500</strong>
      </div>
    </div>

    <div class="star-meter">
      <div class="meter-track">
        <div class="meter-fill"></div>
        <span class="meter-dot d1"></span>
        <span class="meter-dot d2"></span>
        <span class="meter-dot d3"></span>
      </div>
      <div class="meter-labels">
        <span>30k</span>
        <span>60k</span>
        <span>90k</span>
      </div>
    </div>

    <div class="rewards">
      <div class="reward">
        <span class="reward-icon coin"></span>
        <span class="reward-text">850 coins</span>
      </div>
      <div class="reward">
        <span class="reward-icon hammer"></span>
        <span class="reward-text">Hammer +1</span>
      </div>
      <div class="reward">
        <span class="reward-icon chest"></span>
        <span class="reward-text">Gold chest</span>
      </div>
    </div>

    <footer class="actions">
      <button class="ghost">Map</button>
      <button class="primary">Next Level</button>
    </footer>
  </article>
</section>

</body>
</html>
